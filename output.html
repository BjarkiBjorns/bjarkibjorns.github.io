<!DOCTYPE html>
<html>
<head>
  <title>Lissa Output</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; position: fixed; inset: 0; }
    #cf {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="out"></canvas>
  <div id="cf"></div>
  <script>
    var canvas = document.getElementById('out');
    var ctx    = canvas.getContext('2d');
    var cf     = document.getElementById('cf');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Receive pixel-perfect frames from the main window.
    // Uses postMessage + ImageBitmap transfer instead of window.opener DOM access —
    // file:// pages have null origins so cross-window DOM access is cross-origin blocked,
    // but postMessage('*') works regardless of origin.
    var pendingBmp = null;

    window.addEventListener('message', function(e) {
      var d = e.data;
      if (!d || d.type !== 'frame' || !d.bmp) return;
      if (pendingBmp) pendingBmp.close(); // drop stale frame if main outruns display
      pendingBmp = d.bmp;
    });

    function raf() {
      if (pendingBmp) {
        ctx.drawImage(pendingBmp, 0, 0, canvas.width, canvas.height);
        pendingBmp.close();
        pendingBmp = null;
      }
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // BroadcastChannel: CSS filter, color overlay, close command, heartbeat
    var channel = null;
    try { channel = new BroadcastChannel('lissa-output'); } catch(e) {}

    if (channel) {
      channel.addEventListener('message', function(e) {
        var d = e.data;
        if (!d) return;
        if (d.type === 'close') { window.close(); return; }
        if (d.type === 'meta') {
          canvas.style.filter = d.filter || '';
          if (d.cf) {
            cf.style.display      = 'block';
            cf.style.background   = 'rgba('+d.cf.r+','+d.cf.g+','+d.cf.b+','+d.cf.o+')';
            cf.style.mixBlendMode = d.cf.m || 'normal';
          } else {
            cf.style.display = 'none';
          }
        }
      });

      function heartbeat() { channel.postMessage({ type: 'ready' }); }
      heartbeat();
      setInterval(heartbeat, 2000);
    }
  </script>
</body>
</html>
