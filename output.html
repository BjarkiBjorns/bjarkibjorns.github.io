<!DOCTYPE html>
<html>
<head>
  <title>Lissa Output</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
    #fs-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font: 13px/1 system-ui, sans-serif;
      pointer-events: none;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <canvas id="out"></canvas>
  <div id="fs-hint">Click to go fullscreen</div>
  <script>
    var canvas  = document.getElementById('out');
    var ctx     = canvas.getContext('2d');
    var hint    = document.getElementById('fs-hint');
    var channel = null;

    try { channel = new BroadcastChannel('lissa-output'); } catch (e) {}

    if (channel) {
      channel.addEventListener('message', function (e) {
        var d = e.data;
        if (d.type === 'frame') {
          canvas.width  = d.width;
          canvas.height = d.height;
          ctx.drawImage(d.bitmap, 0, 0);
          d.bitmap.close();
        } else if (d.type === 'close') {
          window.close();
        }
      });

      // Announce presence repeatedly so the main page reconnects after a refresh
      function heartbeat() {
        channel.postMessage({ type: 'ready' });
      }
      heartbeat();
      setInterval(heartbeat, 2000);
    }

    // Click anywhere to request fullscreen (hides the URL / title bar)
    document.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function () {});
        hint.style.opacity = '0';
      }
    });

    setTimeout(function () { hint.style.opacity = '0'; }, 5000);
  </script>
</body>
</html>
